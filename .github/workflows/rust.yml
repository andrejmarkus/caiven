name: Rust

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config
      - name: Build docs
        run: cargo doc --no-deps

  artifacts:
    name: Release binaries (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: caiven-linux-x86_64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            archive: caiven-windows-x86_64.zip
          - name: macos-arm64
            os: macos-14
            archive: caiven-macos-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config

      - name: Build Studio and Machine
        run: cargo build --release -p caiven-studio -p caiven-machine

      - name: Package Unix binaries
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/caiven-studio dist/
          cp target/release/caiven-machine dist/
          cp README.md LICENSE CREATOR_RIGHTS.md dist/
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Package Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/caiven-studio.exe dist/
          Copy-Item target/release/caiven-machine.exe dist/
          Copy-Item README.md, LICENSE, CREATOR_RIGHTS.md dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: caiven-${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          pattern: caiven-*
          path: release
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/caiven-linux-x86_64.tar.gz
            release/caiven-windows-x86_64.zip
            release/caiven-macos-arm64.tar.gz
