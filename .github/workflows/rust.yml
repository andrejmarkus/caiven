name: Rust

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config
      - name: Build docs
        run: cargo doc --no-deps

  artifacts:
    name: ${{ matrix.product_label }} (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: studio
            product_label: Caiven Studio
            package: caiven-studio
            binary: caiven-studio
            platform: linux-x86_64
            os: ubuntu-latest
            archive: caiven-studio-linux-x86_64.tar.gz
          - product: machine
            product_label: Caiven Machine
            package: caiven-machine
            binary: caiven-machine
            platform: linux-x86_64
            os: ubuntu-latest
            archive: caiven-machine-linux-x86_64.tar.gz
          - product: studio
            product_label: Caiven Studio
            package: caiven-studio
            binary: caiven-studio
            platform: windows-x86_64
            os: windows-latest
            archive: caiven-studio-windows-x86_64.zip
          - product: machine
            product_label: Caiven Machine
            package: caiven-machine
            binary: caiven-machine
            platform: windows-x86_64
            os: windows-latest
            archive: caiven-machine-windows-x86_64.zip
          - product: studio
            product_label: Caiven Studio
            package: caiven-studio
            binary: caiven-studio
            platform: macos-arm64
            os: macos-14
            archive: caiven-studio-macos-arm64.tar.gz
          - product: machine
            product_label: Caiven Machine
            package: caiven-machine
            binary: caiven-machine
            platform: macos-arm64
            os: macos-14
            archive: caiven-machine-macos-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config

      - name: Build ${{ matrix.product_label }}
        run: cargo build --release -p ${{ matrix.package }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" dist/
          cp README.md LICENSE CREATOR_RIGHTS.md dist/
          tar -czf "${{ matrix.archive }}" -C dist .

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}.exe" dist/
          Copy-Item README.md, LICENSE, CREATOR_RIGHTS.md dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.archive }}"

      - name: Upload ${{ matrix.product_label }}
        uses: actions/upload-artifact@v4
        with:
          name: caiven-${{ matrix.product }}-${{ matrix.platform }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          pattern: caiven-*
          path: release
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
