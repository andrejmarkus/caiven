[workspace]
members = ["crates/fc-core", "crates/fc-rom", "crates/fc-host"]
resolver = "2"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
cpal = "0.17.1"
crc32fast = "1"
env_logger = "0.11"
fc-core = { path = "crates/fc-core" }
fc-rom = { path = "crates/fc-rom" }
image = "0.25"
log = "0.4"
pixels = "0.15"
thiserror = "2"
winit = "0.30"
