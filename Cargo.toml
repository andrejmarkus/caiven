[workspace]
members = ["crates/fc-core", "crates/fc-rom", "crates/fc-asm", "crates/fc-host", "crates/fc-vm", "crates/fc-engine", "crates/fc-lang"]
resolver = "2"

[workspace.dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
cpal = "0.17.1"
crc32fast = "1"
env_logger = "0.11"
fc-asm = { path = "crates/fc-asm" }
fc-lang = { path = "crates/fc-lang" }
fc-core = { path = "crates/fc-core" }
fc-rom = { path = "crates/fc-rom" }
fc-vm = { path = "crates/fc-vm" }
image = "0.25"
log = "0.4"
pixels = "0.15"
serde = { version = "1", features = ["derive"] }
thiserror = "2"
toml = "0.8"
winit = "0.30"
